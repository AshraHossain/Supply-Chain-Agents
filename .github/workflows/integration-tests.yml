name: Integration Tests (with real LLM)

on:
  workflow_dispatch:  # Manual trigger only
    inputs:
      provider:
        description: "LLM Provider (openrouter, anthropic, openai)"
        required: false
        default: "openrouter"

jobs:
  integration-test:
    runs-on: ubuntu-latest
    # Only run on main branch or manual trigger with secrets
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run integration tests with OpenRouter
        env:
          LLM_PROVIDER: ${{ github.event.inputs.provider || 'openrouter' }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          pytest tests/ -v --tb=short -m "not slow"
        continue-on-error: true

      - name: Notify on failure
        if: failure()
        run: echo "Integration tests failed - check logs for details"
